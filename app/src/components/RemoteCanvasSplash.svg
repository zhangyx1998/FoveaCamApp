<svg viewBox="-240 -135 480 270" xmlns="http://www.w3.org/2000/svg">
  <style>
    text {
      font-family: 'Cascadia Code', monospace;
      fill: white;
      text-anchor: middle;
      alignment-baseline: middle;
    }
    g.animated {
      --size: max(100vw, 100vh);
      opacity: 0.4;
    }
    .animated rect {
       x: calc(var(--size) * -0.5);
       y: calc(var(--size) * -0.5);
       width: var(--size);
       height: var(--size);
       animation: rotate 10s linear infinite;
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .vert-lines line {
      stroke-width: 4;
      stroke-linecap: round;
    }
    .circle {
      fill: #0008;
      stroke: #FFF8;
      stroke-width: 8;
    }
  </style>

  <g class="animated">
    <rect />
  </g>
  <g class="vert-lines">
      <animate attributeName="stroke"
        values="#00F;#F00;#0F0;#00F"
        dur="10s"
        repeatCount="indefinite" />
    <line x1="-200" y1="-100" x2="-200" y2="+100" />
    <line x1="200" y1="-100" x2="200" y2="+100" />
  </g>
  <g class="circle">
    <circle cx="0" cy="0" r="100" />
  </g>
  <text x="0" y="0" font-size="28">FoveaCam</text>
</svg>
