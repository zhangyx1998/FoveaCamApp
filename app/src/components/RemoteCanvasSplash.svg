<svg viewBox="-240 -135 480 270" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%">
        <animate attributeName="stop-color" 
          values="#F00;#0F0;#00F;#F00" 
          dur="10s"
          repeatCount="indefinite" />
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color" 
          values="#0F0;#00F;#F00;#0F0" 
          dur="10s"
          repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  
  <style>
    text {
      font-family: 'Cascadia Code', monospace;
      fill: white;
      text-anchor: middle;
      alignment-baseline: middle;
    }
    g.animated {
      --size: max(100vw, 100vh);
      opacity: 0.4;
    }
    .animated rect {
       x: calc(var(--size) * -0.5);
       y: calc(var(--size) * -0.5);
       width: var(--size);
       height: var(--size);
       fill: url(#gradient);
       animation: rotate 10s linear infinite;
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .vert-lines line {
      stroke-width: 4;
      stroke-linecap: round;
    }
    .circle {
      fill: #0008;
      stroke: #FFF8;
      stroke-width: 2;
    }
  </style>
  
  
  <!-- Animated radial gradient beams -->
  <g class="animated">
    <rect />
  </g>
  <g class="vert-lines">
      <animate attributeName="stroke" 
        values="#00F;#F00;#0F0;#00F"
        dur="10s"
        repeatCount="indefinite" />
    <line x1="-200" y1="-100" x2="-200" y2="+100" />
    <line x1="200" y1="-100" x2="200" y2="+100" />
  </g>
  <g class="circle">
    <circle cx="0" cy="0" r="100" />
  </g>
  <text x="0" y="0" font-size="28">FoveaCam</text>
</svg>